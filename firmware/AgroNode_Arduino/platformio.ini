; ===================== AgroNode (ESP32) — platformio.ini =====================
; Sub-node / remote field node. Plain ESP32 DevKit + SX1278 LoRa module.
; If your sub-node is a Heltec WiFi LoRa 32 V2, change:
;   board = heltec_wifi_lora_32_V2
; and set the LoRa pins in config.h to the Heltec internal ones (SS=18, RST=14, DIO0=26).

[env:esp32node]
platform  = espressif32
board     = esp32dev
framework  = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    madhephaestus/ESP32Servo @ ^3.0.5